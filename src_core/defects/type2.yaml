n_samples: 1000
psf_size: 256
crop_size: 32

# Annular aperture
outer_r: [30, 32]
epsilon: [0.9, 0.92]
ellipticity: [0.15, 0.15]
ellip_angle: [0, 0]

# Aberrations (Zernike)
defocus: [0, 0]
astig_x: [0, 0]
astig_y: [0, 0]
coma_x: [0, 0]
coma_y: [0, 0]
spherical: [0, 0]
trefoil_x: [0, 0]
trefoil_y: [0, 0]

# Noise
brightness: [10000, 12000]
background: [5, 5]
poisson_noise: true
gaussian_sigma: [1.5, 1.5]

# Cleaning (connected peak)
threshold_multiplier: 1.0

output_dir: output
